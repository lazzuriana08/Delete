version: "3.8"

services:
  broker:
    build:
      context: .
      dockerfile: Dockerfile
    image: zmq-tasks:latest
    container_name: broker
    volumes:
      - ./broker.py:/app/main.py
    ports:
      - "5555:5555"   
      - "5556:5556"   

  servidor:
    build:
      context: .
      dockerfile: Dockerfile
    image: zmq-tasks:latest
    container_name: servidor
    volumes:
      - ./servidor.py:/app/main.py
    depends_on:
      - broker

  cliente:
    build:
      context: .
      dockerfile: Dockerfile
    image: zmq-tasks:latest
    container_name: cliente
    volumes:
      - ./cliente.py:/app/main.py
    depends_on:
      - servidor
